<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SoundTag Web</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>SoundTag</h1>
    </div>
    <div class="gps" id="gpsBadge">GPS: —</div>
  </header>

  <main class="container">
    <section class="card">
      <div class="meter">
        <div class="timer" id="timer">00:00</div>
        <div class="state" id="stateText">Idle</div>
      </div>
      <div class="controls">
        <button id="recordBtn" class="btn btn-primary">&#9679; Record</button>
        <button id="stopBtn" class="btn" disabled>&#9632; Stop</button>
      </div>
      <audio id="preview" controls hidden></audio>
    </section>
  </main>

  <div id="snackbar" class="snackbar" hidden></div>
  <script type="module" src="app.js"></script>
</body>
</html>

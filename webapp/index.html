<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SoundTag Web</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>SoundTag</h1>
    </div>
    <div class="gps" id="gpsBadge">GPS: —</div>
  </header>

  <main class="container">
    <section class="card">
      <div class="meter">
        <div class="timer" id="timer">00:00</div>
        <div class="state" id="stateText">Idle</div>
      </div>
      <div class="controls">
        <button id="recordBtn" class="btn btn-primary">&#9679; Record</button>
        <button id="stopBtn" class="btn" disabled>&#9632; Stop</button>
      </div>
      <audio id="preview" controls hidden></audio>
    </section>

    <section class="card" id="annotateCard" hidden>
      <h2>Annotate</h2>

      <label>Filename</label>
      <input id="filename" type="text" placeholder="traffic_001" />

      <label>Noise Class</label>
      <div class="chips" id="labelChips"></div>

      <label>Severity</label>
      <div class="chips" id="severityChips"></div>

      <label>Environment</label>
      <div class="chips" id="envChips"></div>

      <label>Location Context</label>
      <div class="chips" id="ctxChips"></div>

      <label class="row"><input id="isNoise" type="checkbox" checked /> Is noise</label>

      <label>Annotator ID</label>
      <input id="annotator" type="text" placeholder="hemal" />

      <label>Notes</label>
      <textarea id="notes" rows="2"></textarea>

      <div class="controls">
        <button id="saveLocalBtn" class="btn btn-primary">Save Locally</button>
      </div>
    </section>
  </main>

  <div id="snackbar" class="snackbar" hidden></div>
  <script type="module" src="app.js"></script>
</body>
</html>
